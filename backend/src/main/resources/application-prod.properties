spring.application.name=backend

# =============================
# PRODUCTION DATABASE (PostgreSQL)
# =============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================
# JPA / HIBERNATE (Production-safe)
# =============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================
# CONNECTION POOLING (HikariCP)
# =============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# =============================
# ADVANCED HIKARICP SETTINGS
# =============================
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.data-source-properties.prepareThreshold=3
spring.datasource.hikari.data-source-properties.prepareCacheSize=25
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# =============================
# FLYWAY MIGRATION (Disabled - Using JPA for schema management)
# =============================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =============================
# LOGGING (Less verbose)
# =============================
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.reviewsaver=INFO

# =============================
# SERVER & ERROR HANDLING
# =============================
server.error.include-message=never
server.error.include-stacktrace=never

# ============================================
# EMAIL CONFIGURATION (For OTP and Password Reset)
# ============================================
# Gmail SMTP (Recommended for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# SECURITY CONFIGURATION
# ============================================
# BCrypt strength (higher = more secure but slower)
spring.security.bcrypt.strength=10

# ============================================
# FRONTEND URL (For CORS and password reset links)
# ============================================
frontend.url=${FRONTEND_URL:http://localhost:3000}
